name: Release

on:
  push:
    tags:
      - 'sdk/v*'
      - 'x402/v*'
      - 'mcp/v*'

jobs:
  publish-sdk:
    name: Publish @sigil/sdk
    if: startsWith(github.ref, 'refs/tags/sdk/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install
        working-directory: packages/sdk

      - name: Build
        run: bun run build
        working-directory: packages/sdk

      - name: Publish
        run: npm publish --access public
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-x402:
    name: Publish @sigil/x402
    if: startsWith(github.ref, 'refs/tags/x402/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install
        working-directory: packages/x402-middleware

      - name: Build
        run: bun run build
        working-directory: packages/x402-middleware

      - name: Publish
        run: npm publish --access public
        working-directory: packages/x402-middleware
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
