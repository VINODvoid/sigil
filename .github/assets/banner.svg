<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="bounds">
      <rect width="1200" height="260"/>
    </clipPath>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.28; }
      12.5% { opacity: 1; }
      25% { opacity: 0.28; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .spoke {
      animation: pulse 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    .title   { animation: fadeUp 0.7s ease-out 0.1s both; }
    .divider { animation: fadeIn 0.5s ease-out 0.45s both; }
    .sub     { animation: fadeUp 0.7s ease-out 0.5s both; }
    .tagline { animation: fadeUp 0.7s ease-out 0.75s both; }
    .tags    { animation: fadeUp 0.7s ease-out 1.0s both; }
  </style>

  <!-- Background -->
  <rect width="1200" height="260" fill="#ffffff" clip-path="url(#bounds)"/>

  <!-- Subtle grid -->
  <g stroke="#000000" stroke-width="0.5" opacity="0.05">
    <line x1="0"   y1="65"  x2="1200" y2="65"/>
    <line x1="0"   y1="130" x2="1200" y2="130"/>
    <line x1="0"   y1="195" x2="1200" y2="195"/>
    <line x1="248" y1="0"   x2="248"  y2="260"/>
    <line x1="600" y1="0"   x2="600"  y2="260"/>
    <line x1="900" y1="0"   x2="900"  y2="260"/>
  </g>

  <!-- ─── Logo Area (0–248px) ─── -->

  <!-- Inner static ring -->
  <circle cx="124" cy="130" r="72"
    fill="none"
    stroke="#000000"
    stroke-width="1"
    stroke-opacity="0.1"/>

  <!-- ─── Actual Sigil Logo Mark ─── -->
  <g transform="translate(47, 46) scale(3.5)">
    <g transform="translate(4, 0)">
      <path class="spoke" style="animation-delay: 0s;" fill-rule="evenodd" clip-rule="evenodd" d="M18.5 19V4L21.5 4V19H18.5Z" fill="#000000"/>
      <path class="spoke" style="animation-delay: 0.5s;" fill-rule="evenodd" clip-rule="evenodd" d="M22.4754 19.404L33.082 8.79736L35.2034 10.9187L26.7181 19.404L22.4754 19.404Z" fill="#000000"/>
      <path class="spoke" style="animation-delay: 1s;" fill-rule="evenodd" clip-rule="evenodd" d="M18.5 22.5L40 22.5V25.5L18.5 25.5V22.5Z" fill="#000000"/>
      <path class="spoke" style="animation-delay: 1.5s;" fill-rule="evenodd" clip-rule="evenodd" d="M26.7178 28.5963L35.2031 37.0815L33.0818 39.2029L22.4752 28.5963H26.7178Z" fill="#000000"/>
      <path class="spoke" style="animation-delay: 2s;" fill-rule="evenodd" clip-rule="evenodd" d="M18.5 44V29H21.5V44H18.5Z" fill="#000000"/>
      <path class="spoke" style="animation-delay: 2.5s;" fill-rule="evenodd" clip-rule="evenodd" d="M4.79776 37.0816L15.4044 26.475L17.5257 28.5964L6.91908 39.203L4.79776 37.0816Z" fill="#000000"/>
      <path class="spoke" style="animation-delay: 3s;" fill-rule="evenodd" clip-rule="evenodd" d="M2.62269e-07 22.5L15 22.5V25.5L0 25.5L2.62269e-07 22.5Z" fill="#000000"/>
      <path class="spoke" style="animation-delay: 3.5s;" fill-rule="evenodd" clip-rule="evenodd" d="M6.91885 8.79727L17.5255 19.4039L15.4041 21.5252L4.79753 10.9186L6.91885 8.79727Z" fill="#000000"/>
    </g>
  </g>

  <!-- Separator line -->
  <line x1="248" y1="36" x2="248" y2="224"
    stroke="#000000" stroke-width="1" stroke-opacity="0.1"/>

  <!-- ─── Text Content ─── -->

  <!-- SIGIL wordmark -->
  <text x="278" y="108"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="78"
    font-weight="bold"
    fill="#000000"
    letter-spacing="10"
    class="title">SIGIL</text>

  <!-- Underline -->
  <rect x="278" y="122" width="430" height="1.5" fill="#000000" fill-opacity="0.1" rx="1" class="divider"/>

  <!-- Subtitle -->
  <text x="280" y="152"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5"
    fill="#000000"
    fill-opacity="0.6"
    letter-spacing="5.5"
    class="sub">IDENTITY · TRUST · DISCOVERY</text>

  <!-- Tagline -->
  <text x="280" y="184"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="13.5"
    fill="#000000"
    fill-opacity="0.4"
    class="tagline">The KYA primitive for AI agents transacting on Solana</text>

  <!-- Tech tags -->
  <g class="tags">
    <rect x="280" y="208" width="72" height="24" rx="4"
      fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
    <text x="316" y="224" text-anchor="middle"
      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#18181b">Solana</text>

    <rect x="360" y="208" width="68" height="24" rx="4"
      fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
    <text x="394" y="224" text-anchor="middle"
      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#18181b">Anchor</text>

    <rect x="436" y="208" width="86" height="24" rx="4"
      fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
    <text x="479" y="224" text-anchor="middle"
      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#18181b">TypeScript</text>

    <rect x="530" y="208" width="66" height="24" rx="4"
      fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
    <text x="563" y="224" text-anchor="middle"
      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#18181b">Next.js</text>

    <rect x="604" y="208" width="52" height="24" rx="4"
      fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
    <text x="630" y="224" text-anchor="middle"
      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#18181b">x402</text>
  </g>
</svg>
