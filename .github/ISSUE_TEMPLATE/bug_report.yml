name: Bug Report
description: Report a reproducible bug in Sigil
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, search [existing issues](https://github.com/sigil-xyz/sigil/issues) to avoid duplicates.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Credential Program (on-chain)
        - Registry Program (on-chain)
        - Reputation Program (on-chain)
        - SDK (@sigil/sdk)
        - x402 Middleware (@sigil/x402)
        - Dashboard (UI)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Call `client.issueSigil(...)` with ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error messages, stack traces, or transaction signatures where applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. @sigil/sdk@0.1.0-alpha, Solana devnet, Anchor 1.0.0
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Wallet adapter, cluster, browser, OS — anything relevant.
