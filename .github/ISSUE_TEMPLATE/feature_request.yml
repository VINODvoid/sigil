name: Feature Request
description: Propose a new feature or enhancement
labels: [enhancement]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Credential Program (on-chain)
        - Registry Program (on-chain)
        - Reputation Program (on-chain)
        - SDK (@sigil/sdk)
        - x402 Middleware (@sigil/x402)
        - Dashboard (UI)
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What should the behavior or API look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider and why did you rule them out?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This is a single, focused request (not multiple features bundled together).
          required: true
